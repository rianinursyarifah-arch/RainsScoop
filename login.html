<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Rain'sScoop 🍨</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    /* ===== PALET WARNA PASTEL & KUSTOMISASI FONT ===== */
    :root {
      --pink-bg: #FFFDD0;     /* Cream Pastel untuk Background Utama */
      --white: #FFFEEA;       /* Light Cream Pastel untuk Background Kartu */
      --off-white: #E8F5E9;   /* Hijau Pastel Muted untuk Background Input */
      --border: #C8E6C9;      /* Hijau Pastel untuk Border */
      --pink-deep: #F8BBD0;    /* Pink Pastel untuk Elemen Utama / Tombol */
      --pink-light: #FDF0F3;   /* Light Pink Pastel untuk Sorotan */
      --green-deep: #A5D6A7;   /* Hijau Pastel untuk Status Sukses */
      --text-dark: #333333;
      --text-mid: #555555;
      --text-light: #777777;
    }

    /* Mengubah seluruh font isi selain heading menjadi Comic Sans MS */
    body, input, button, p, label, a, li, span {
      font-family: 'Copperplate Gothic Light', 'Chalkboard SE', 'Comic Neue', sans-serif !important;
    }

    .auth-page {
      min-height: 100vh;
      background: var(--pink-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1rem 3rem;
    }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
      border: 1px solid var(--border);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .auth-logo a {
      text-decoration: none;
    }

    .auth-logo .logo-icon {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 0.4rem;
    }

    .auth-logo .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text-dark);
    }

    .auth-logo .logo-text em {
      color: var(--text-dark);
      font-style: normal;
    }

    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text-dark);
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .auth-subtitle {
      text-align: center;
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .auth-field {
      margin-bottom: 1.1rem;
    }

    .auth-field label {
      display: block;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-mid);
      margin-bottom: 0.4rem;
    }

    .auth-field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      color: var(--text-dark);
      background: var(--off-white);
      transition: var(--transition);
      outline: none;
    }

    .auth-field input:focus,
    .auth-field select:focus {
      border-color: var(--pink-deep);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(248,187,208,0.3);
    }

    .auth-field select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      color: var(--text-dark);
      background: var(--off-white);
      transition: var(--transition);
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--text-dark) 50%), linear-gradient(135deg, var(--text-dark) 50%, transparent 50%);
      background-position: calc(100% - 1rem) calc(1em + 2px), calc(100% - 0.75rem) calc(1em + 2px);
      background-size: 0.45em 0.45em, 0.45em 0.45em;
      background-repeat: no-repeat;
    }

    .auth-btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.85rem;
      background: var(--pink-deep);
      color: #333333;
      border: none;
      border-radius: var(--radius-full);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .auth-btn:hover {
      background: #f4a2b8;
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .auth-msg {
      margin-top: 0.75rem;
      font-size: 0.88rem;
      text-align: center;
      min-height: 1.2rem;
      color: #d4617a;
    }

    .auth-msg.success {
      color: var(--green-deep);
    }

    .auth-footer-text {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-light);
      margin-top: 1.5rem;
    }

    .auth-footer-text a {
      color: var(--text-dark);
      text-decoration: underline;
      font-weight: 500;
    }

    .auth-footer-text a:hover {
      color: var(--text-light);
    }

    .auth-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🍨</span> <!-- BRAND ICON BERUBAH MENJADI ICE CREAM -->
        <span class="logo-text">Rain's <em>Scoop</em></span> <!-- NAMA NAVBAR BERUBAH MENJADI LIFA FLORA -->
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="index.html#products" class="nav-link">Produk</a></li>
        <li><a href="index.html#contact" class="nav-link">Kontak</a></li>
      </ul>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===================== AUTH FORM ===================== -->
  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html">
          <span class="logo-icon">🍨</span> <!-- BRAND ICON BERUBAH MENJADI ICE CREAM -->
          <span class="logo-text">Rain's <em>Scoop</em></span> <!-- NAMA BRAND BERUBAH MENJADI LIFA FLORA -->
        </a>
      </div>

      <h1 class="auth-title">Rain'sScoop</h1> <!-- HEADING BERUBAH MENJADI LIFA FLORA -->
      <p class="auth-subtitle">Masuk ke akunmu untuk menikmati gelato favoritmu</p> <!-- SUB-HEADING DIUBAH CONTEXT-NYA -->

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="auth-field">
          <label for="loginRole">Masuk sebagai</label>
          <select id="loginRole" name="role" required>
            <option value="pembeli" selected>Masuk sebagai Pembeli</option>
            <option value="admin">Masuk sebagai Admin</option>
          </select>
        </div>
        <div class="auth-field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" placeholder="nama@email.com" required />
        </div>
        <div class="auth-field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="auth-btn">Masuk</button>
        <p class="auth-msg" id="loginMsg"></p>
      </form>

      <hr class="auth-divider" />

      <p class="auth-footer-text">
        Belum punya akun? <a href="register.html">Daftar sekarang</a>
      </p>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    // Init halaman login
    lucide.createIcons();
    loadState();

    function handleLogin(e) {
      e.preventDefault();
      const role = document.getElementById('loginRole')?.value || 'pembeli';
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      const msgEl = document.getElementById('loginMsg');

      if (role === 'admin') {
        if ((email === 'admin' || email === 'admin@rainsscoop.com') && password === 'admin123') {
          setSession({ id: 'admin', nama: 'Admin', email: 'admin@rainsscoop.com', role: 'admin' });
          msgEl.textContent = '✅ Admin berhasil masuk! Mengalihkan...';
          msgEl.className = 'auth-msg success';
          setTimeout(() => { window.location.href = './admin_dashboard.html'; }, 900);
          return;
        }

        msgEl.textContent = '❌ Email atau password admin salah.';
        msgEl.className = 'auth-msg';
        return;
      }

      // Login Pembeli murni client-side
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        setSession({ id: user.id, nama: user.nama, email: user.email, role: 'pembeli' });
        msgEl.textContent = '✅ Berhasil masuk! Mengalihkan...';
        msgEl.className = 'auth-msg success';
        setTimeout(() => { window.location.href = './index.html'; }, 900);
        return;
      }

      msgEl.textContent = '❌ Email atau password pembeli salah.';
      msgEl.className = 'auth-msg';
    }

    // Jika sudah login, redirect ke home atau admin dashboard
    if (getSession()) {
      const session = getSession();
      if (session && session.id === 'admin') {
        window.location.href = './admin_dashboard.html';
      } else {
        window.location.href = './index.html';
      }
    }

    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
  <script>initCSWidget();</script>
</body>
</html>
