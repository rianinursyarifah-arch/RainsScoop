<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Produk — Rain'sScoop Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin_style.css" />
  <style>
    /* TAMBAHAN: Override warna eksternal ke tema pastel & font Snap ITC warna hitam */
    :root {
      --ad-bg: #FFFDD0;          /* Cream Pastel */
      --ad-sidebar: #E8F5E9;     /* Hijau Pastel */
      --ad-card: #FFFDD0;        /* Cream Pastel */
      --ad-offwhite: #FFFEEA;    /* Light Cream Pastel */
      --ad-pink: #F8BBD0;        /* Pink Pastel */
      --ad-pink-lt: #FDF0F3;     /* Light Pink Pastel */
      --ad-border: #C8E6C9;      /* Hijau Pastel Muted */
      --ad-muted: #333333;       /* Hitam Muted */
    }

    /* Mengubah seluruh isi halaman menggunakan font Comic Sans MS dengan warna hitam */
    * {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Sans', sans-serif !important;
      color: #000000 !important; /* Font warna hitam */
    }

    /* Hanya tulisan heading dan sub heading saja yang menggunakan Snap ITC */
    .ad-brand-name,
    .ad-brand-sub,
    .ad-page-title,
    .ad-page-sub,
    .ad-field label {
      font-family: 'Copperplate Gothic Light', 'Arial Black', sans-serif !important;
    }

    /* Mengembalikan warna ikon emoji bawaan agar tetap terlihat berwarna */
    .ad-brand-icon, .ad-nav-icon, .foto-upload-icon {
      color: initial !important;
    }

    /* Kodingan bawaan sebelumnya */
    .foto-upload-area {
      border: 2px dashed var(--ad-border);
      border-radius: var(--ad-radius);
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--ad-offwhite);
      position: relative;
    }
    .foto-upload-area:hover { border-color: var(--ad-pink); background: var(--ad-pink-lt); }
    .foto-upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .foto-upload-icon { font-size: 2rem; margin-bottom: 0.35rem; }
    .foto-upload-text { font-size: 0.82rem; color: var(--ad-muted); }
    .foto-preview-wrap {
      display: none; position: relative;
      border-radius: var(--ad-radius); overflow: hidden;
      border: 2px solid var(--ad-pink);
    }
    .foto-preview-wrap img {
      width: 100%; height: 160px; object-fit: cover; display: block;
    }
    .foto-preview-remove {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.6); color: white !important;
      border: none; border-radius: 50%;
      width: 24px; height: 24px; cursor: pointer;
      font-size: 0.75rem; display: flex; align-items: center; justify-content: center;
    }
    .foto-current {
      border: 1px solid var(--ad-border);
      border-radius: var(--ad-radius);
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .foto-current img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .foto-current-label {
      font-size: 0.72rem; color: var(--ad-muted);
      padding: 0.3rem 0.5rem; background: var(--ad-offwhite);
      text-align: center;
    }

    /* Tambahan penyesuaian visual warna background utama */
    body, .ad-shell {
      background-color: var(--ad-bg) !important;
    }
    .ad-sidebar {
      background-color: var(--ad-sidebar) !important;
      border-right: 2px solid var(--ad-pink);
    }
    .ad-shell { position: relative; }
    .sidebar-collapse-btn {
      position: absolute;
      top: 1rem;
      left: calc(var(--ad-sidebar) - 20px);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--ad-border);
      background: var(--ad-pink);
      color: #000;
      font-weight: 800;
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      z-index: 200;
      transition: left 0.25s ease;
    }
    .ad-shell.sidebar-collapsed .ad-sidebar {
      width: 0 !important;
      min-width: 0 !important;
      border-right: none !important;
      overflow: hidden;
    }
    .ad-shell.sidebar-collapsed .ad-sidebar .ad-brand,
    .ad-shell.sidebar-collapsed .ad-sidebar .ad-nav,
    .ad-shell.sidebar-collapsed .ad-sidebar .ad-sidebar-footer {
      display: none !important;
    }
    .ad-shell.sidebar-collapsed .ad-main {
      margin-left: 0 !important;
    }
    .ad-shell.sidebar-collapsed .sidebar-collapse-btn {
      left: 10px;
    }
    .ad-form-card {
      background-color: var(--ad-card) !important;
      border: 2px solid var(--ad-pink);
    }
    input, select, textarea {
      background-color: #ffffff !important;
      border: 1px solid var(--ad-border) !important;
    }
    .ad-submit-btn {
      background-color: var(--ad-pink) !important;
      border: 1px solid var(--ad-border) !important;
    }
  </style>
</head>
<body>

<div class="ad-shell">

  <aside class="ad-sidebar">
    <div class="ad-brand">
      <div class="ad-brand-icon">🍨</div>
      <div class="ad-brand-name">Rain's<em>Scoop</em></div>
      <div class="ad-brand-sub">Panel Admin</div>
    </div>
    <button id="sidebarToggleBtn" class="sidebar-collapse-btn" onclick="toggleSidebar()">=</button>
    <nav class="ad-nav">
      <a href="admin_dashboard.html" class="ad-nav-link"><span class="ad-nav-icon">📊</span> Dashboard</a>
      <a href="admin_produk.html"    class="ad-nav-link active"><span class="ad-nav-icon">🍨</span> Produk</a>
      <a href="admin_pesanan.html"   class="ad-nav-link"><span class="ad-nav-icon">📦</span> Pesanan</a>
    </nav>
    <div class="ad-sidebar-footer">
      <button class="ad-logout-btn" onclick="doLogout()">🚪 Keluar</button>
    </div>
  </aside>

  <main class="ad-main">
    <div id="apinWatermark">Developed by Apin</div>
    <div class="ad-topbar">
      <div>
        <div class="ad-page-title">Edit Produk</div>
        <div class="ad-page-sub">Ubah detail produk yang sudah ada</div>
      </div>
    </div>

    <div class="ad-form-card">
      <form id="formEditProduk">
        <div class="ad-form-grid">

          <div class="ad-field full">
            <label for="epNama">Nama Produk *</label>
            <input type="text" id="epNama" placeholder="Nama produk" required />
          </div>

          <div class="ad-field">
            <label for="epHarga">Harga (Rp) *</label>
            <input type="number" id="epHarga" placeholder="185000" min="0" required />
          </div>

          <div class="ad-field">
            <label for="epStok">Stok *</label>
            <input type="number" id="epStok" placeholder="10" min="0" required />
          </div>

          <div class="ad-field">
            <label for="epKategori">Kategori *</label>
            <select id="epKategori" required>
              <option value="">-- Pilih Kategori --</option>
              <option value="susu">🥛 Susu</option>
              <option value="buah">🍓 Buah</option>
              <option value="authentik">🌿 Authentik</option>
              <option value="mix">🍧 Mix</option>
            </select>
          </div>

          <div class="ad-field">
            <label for="epEmoji">Emoji Produk</label>
            <input type="text" id="epEmoji" placeholder="🍨" maxlength="4" />
          </div>

          <div class="ad-field full">
            <label>Foto Produk</label>
            <div class="foto-current" id="epFotoCurrent" style="display:none;">
              <img id="epFotoCurrentImg" src="" alt="Foto saat ini" />
              <div class="foto-current-label">📸 Foto saat ini — klik di bawah untuk ganti</div>
            </div>
            <div class="foto-upload-area" id="epFotoArea" onclick="document.getElementById('epFoto').click()">
              <input type="file" id="epFoto" accept="image/*" onchange="previewFoto('epFoto','epFotoPreview','epFotoArea')" />
              <div class="foto-upload-icon">📸</div>
              <div class="foto-upload-text">Klik untuk ganti foto produk<br/><small>JPG, PNG, WEBP — Maks. 2MB</small></div>
            </div>
            <div class="foto-preview-wrap" id="epFotoPreview">
              <img id="epFotoImg" src="" alt="Preview baru" />
              <button type="button" class="foto-preview-remove" onclick="removeFoto('epFoto','epFotoPreview','epFotoArea')">✕</button>
            </div>
          </div>

          <div class="ad-field full">
            <label for="epDesc">Deskripsi Produk</label>
            <textarea id="epDesc" placeholder="Deskripsi singkat produk..."></textarea>
          </div>

          <label class="ad-checkbox-row">
            <input type="checkbox" id="epHot" />
            🔥 Tandai sebagai produk <strong>Hot / Terlaris</strong>
          </label>

          <div class="ad-form-actions">
            <button type="submit" class="ad-submit-btn">💾 Simpan Perubahan</button>
            <a href="admin_produk.html" class="ad-cancel-btn">Batal</a>
          </div>

        </div>
      </form>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>
<script>
// toggleSidebar() & init collapse sekarang di-handle oleh admin_sidebar_component.js
</script>
<script src="admin_sidebar_component.js"></script>
<script src="admin_script.js"></script>
<script>initEditProduk();</script>
</body>
</html>
